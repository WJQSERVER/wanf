name: Go Test Ci

on:
  # 允许手动触发
  workflow_dispatch:

  # 每次提交代码触发
  push:
    branches:
      - '**'

  # 开启 PR 时触发
  pull_request:
    branches:
      - '**'

jobs:
  test-and-bench:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          check-latest: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests with Race Detector
        # 确保并发探测逻辑不存在竞态冲突
        run: go test -v -race ./...

      - name: Run Benchmarks
        # 性能压测，关注内存分配和执行效率
        run: go test -v -bench=. -benchmem ./...
